<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BTS · Un mensaje para ti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  font-family: 'Inter', ui-sans-serif, sans-serif;
  background: #000;
  color: #fff;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.screen {
  position: relative;
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

/* ── BACKGROUND: video de Aurora en la izquierda como fondo completo ── */
.bg-video {
  position: absolute;
  inset: 0;
  z-index: 0;
}
.bg-video video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: left center;
}

/* fade oscuro desde abajo para que el texto sea legible */
.bg-fade {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.25) 30%,
    rgba(0,0,0,0.65) 55%,
    rgba(0,0,0,0.92) 75%,
    #000 100%
  );
}

/* ── BRAND ── */
.brand {
  position: absolute;
  top: 28px;
  left: 24px;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0;
  animation: fadeDown .7s ease .2s forwards;
}
.brand-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  flex-shrink: 0;
}
.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

/* ── CONTENT ── */
.content {
  position: relative;
  z-index: 10;
  padding: 0 24px 52px;
  display: flex;
  flex-direction: column;
}

.hero-title {
  font-size: clamp(38px, 11vw, 52px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.05;
  margin-bottom: 28px;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp .8s cubic-bezier(0.22,1,0.36,1) .35s forwards;
}

/* ── QUOTE CARD ── */
.quote-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 24px 22px 22px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(18px);
  animation: fadeUp .9s cubic-bezier(0.22,1,0.36,1) .55s forwards;
}
.quote-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
}

.quote-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(19px, 5.5vw, 24px);
  font-style: italic;
  font-weight: 400;
  line-height: 1.45;
  color: #fff;
  margin-bottom: 20px;
  min-height: 80px;
}
.quote-text .word {
  display: inline-block;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .4s ease, transform .4s ease;
  margin-right: 0.22em;
}
.quote-text .word.on { opacity: 1; transform: translateY(0); }

.divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin-bottom: 16px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .9s cubic-bezier(0.22,1,0.36,1);
}
.divider.grow { transform: scaleX(1); }

.meta {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .5s ease, transform .5s ease;
}
.meta.on { opacity: 1; transform: translateY(0); }

.member-badge {
  display: inline-block;
  background: #fff;
  color: #000;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 100px;
  white-space: nowrap;
  margin-bottom: 6px;
}
.source-text {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  font-style: italic;
  line-height: 1.5;
}
.meta-ko {
  font-size: 26px;
  color: rgba(255,255,255,0.08);
  font-family: 'Playfair Display', serif;
  font-style: italic;
  line-height: 1;
  flex-shrink: 0;
  padding-top: 2px;
}

/* ── LOADER ── */
#loader {
  position: fixed; inset: 0; z-index: 200;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px;
  transition: opacity .6s ease, visibility .6s ease;
}
#loader.out { opacity: 0; visibility: hidden; }
.loader-ko {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -0.04em;
  color: rgba(255,255,255,0.9);
  animation: pulse 1.3s ease-in-out infinite;
}
.loader-bar {
  width: 160px; height: 1px;
  background: rgba(255,255,255,0.1);
  position: relative; overflow: hidden;
}
.loader-bar::after {
  content: '';
  position: absolute; top: 0; bottom: 0;
  width: 50%;
  background: rgba(255,255,255,0.6);
  animation: slide 1s ease-in-out infinite;
}
.loader-hint {
  font-size: 11px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { to { opacity:1; } }
@keyframes pulse   { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes slide   { 0%{left:-50%} 100%{left:150%} }
</style>
</head>

var TOTAL = Q.length;

function getIdx() {
  var k = 'bts_es_v2';
  var s = sessionStorage.getItem(k);
  if (s !== null) return parseInt(s, 10);
  var n = Math.floor(Math.random() * TOTAL);
  sessionStorage.setItem(k, n);
  return n;
}

function animWords(el, text, base) {
  el.innerHTML = '';
  var words = text.split(' ');
  words.forEach(function(w, i) {
    var sp = document.createElement('span');
    sp.className = 'word';
    sp.textContent = w;
    el.appendChild(sp);
    setTimeout(function() { sp.classList.add('on'); }, base + i * 50);
  });
  return base + words.length * 50 + 80;
}

function render() {
  var idx = getIdx();
  var q = Q[idx];
  document.getElementById('m-badge').textContent = q.m;
  document.getElementById('m-src').textContent = q.s;
  document.getElementById('m-ko').textContent = q.ko;

  var divLine = document.getElementById('div-line');
  var meta = document.getElementById('meta');
  divLine.classList.remove('grow');
  meta.classList.remove('on');

  var done = animWords(document.getElementById('q-text'), q.t, 80);
  setTimeout(function() { divLine.classList.add('grow'); }, done);
  setTimeout(function() { meta.classList.add('on'); }, done + 450);
}

window.addEventListener('load', function() {
  setTimeout(function() {
    document.getElementById('loader').classList.add('out');
    render();
  }, 1400);
});
</script>
